name: 'azure_medallion'
version: '1.0.0'
config-version: 2

profile: 'azure_medallion'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  azure_medallion:
    bronze:
      +materialized: view
      +schema: bronze
    silver:
      +materialized: table
      +schema: silver
    gold:
      +materialized: incremental
      +schema: gold

vars:
  run_date: "{{ run_started_at.strftime('%Y-%m-%d') }}"
